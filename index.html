<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SpeedTest Pro - 真實網路測速</title>
    <!-- PWA 設定 -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0d131f">
    <meta name="mobile-web-app-capable" content="yes">
    <link rel="apple-touch-icon" href="192.png">
    <style>
        :root {
            --bg-color: #0d131f;
            --card-bg: #1e2532;
            --primary-cyan: #3abff8;
            --text-main: #ffffff;
            --text-muted: #8b949e;
            --accent-green: #34d399;
            --accent-pink: #f472b6;
            --accent-orange: #fb923c;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-main); display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .app-container { width: 100%; max-width: 400px; padding: 24px; display: flex; flex-direction: column; gap: 20px; }
        .header { display: flex; justify-content: space-between; align-items: center; }
        .title h1 { font-size: 24px; font-weight: 600; }
        .title p { color: var(--accent-green); font-size: 13px; margin-top: 4px; }
        .top-stats { display: flex; gap: 12px; }
        .stat-card { flex: 1; background-color: var(--card-bg); border-radius: 16px; padding: 16px; display: flex; align-items: center; gap: 10px; border: 1px solid rgba(255,255,255,0.05); }
        .stat-info h3 { font-size: 11px; color: var(--text-muted); text-transform: uppercase; }
        .stat-info p { font-size: 16px; font-weight: bold; }
        .gauge-container { position: relative; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 260px; }
        .svg-gauge { position: absolute; width: 240px; height: 240px; transform: rotate(135deg); }
        .gauge-bg { fill: none; stroke: var(--card-bg); stroke-width: 12; stroke-dasharray: 424 565; }
        .gauge-progress { fill: none; stroke: var(--primary-cyan); stroke-width: 12; stroke-dasharray: 565; stroke-dashoffset: 565; stroke-linecap: round; transition: stroke-dashoffset 0.1s linear; }
        .gauge-content { text-align: center; z-index: 10; }
        .gauge-value { font-size: 56px; font-weight: bold; }
        .gauge-unit { color: var(--text-muted); font-size: 16px; }
        .gauge-label { color: var(--primary-cyan); font-size: 14px; margin-top: 8px; font-weight: bold; }
        .bottom-stats { display: flex; gap: 12px; }
        .main-stat-card { flex: 1; background-color: var(--card-bg); border-radius: 16px; padding: 20px; text-align: center; border: 1px solid rgba(255,255,255,0.05); }
        .main-stat-card h3 { font-size: 11px; color: var(--text-muted); margin-bottom: 8px; }
        .main-stat-card p { font-size: 24px; font-weight: bold; }
        .main-stat-card span { font-size: 12px; color: var(--text-muted); }
        .start-btn { background-color: var(--primary-cyan); color: #000; border: none; border-radius: 14px; padding: 18px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .start-btn:disabled { background-color: #333; color: #777; }
    </style>
</head>
<body>

<div class="app-container">
    <header class="header">
        <div class="title">
            <h1>SpeedTest Pro <span style="font-size:10px; color:yellow;">V3_FINAL</span></h1>
            <p>Cloudflare 真實節點測速 v2</p>
        </div>
    </header>

    <div class="top-stats">
        <div class="stat-card">
            <div class="stat-info"><h3>延遲 (Ping)</h3><p id="pingVal">0 ms</p></div>
        </div>
        <div class="stat-card">
            <div class="stat-info"><h3>抖動 (Jitter)</h3><p id="jitterVal">0 ms</p></div>
        </div>
    </div>

    <div class="gauge-container">
        <svg class="svg-gauge" viewBox="0 0 200 200">
            <circle class="gauge-bg" cx="100" cy="100" r="90"></circle>
            <circle class="gauge-progress" id="gaugeProgress" cx="100" cy="100" r="90"></circle>
        </svg>
        <div class="gauge-content">
            <div class="gauge-value" id="mainValue">0.0</div>
            <div class="gauge-unit">Mbps</div>
            <div class="gauge-label" id="mainLabel">準備測試</div>
        </div>
    </div>

    <div class="bottom-stats">
        <div class="main-stat-card">
            <h3>下載 (DOWNLOAD)</h3>
            <p id="dlVal">0.0</p>
            <span>Mbps</span>
        </div>
        <div class="main-stat-card">
            <h3>上傳 (UPLOAD)</h3>
            <p id="ulVal">0.0</p>
            <span>Mbps</span>
        </div>
    </div>

    <button class="start-btn" id="startBtn">▶ 開始測試</button>
</div>

<script>
    const UI = {
        btn: document.getElementById('startBtn'),
        mainVal: document.getElementById('mainValue'),
        mainLabel: document.getElementById('mainLabel'),
        dlVal: document.getElementById('dlVal'),
        ulVal: document.getElementById('ulVal'),
        pingVal: document.getElementById('pingVal'),
        jitterVal: document.getElementById('jitterVal'),
        gauge: document.getElementById('gaugeProgress')
    };

    const MAX_DASH = 565;
    const ARC_LENGTH = 424;

    function updateGauge(mbps, maxMbps = 300) {
        let percent = Math.min((mbps / maxMbps) * 100, 100);
        const offset = MAX_DASH - (percent / 100) * ARC_LENGTH;
        UI.gauge.style.strokeDashoffset = offset;
    }

    function setGaugeColor(color) {
        UI.gauge.style.stroke = color;
        UI.mainLabel.style.color = color;
    }

    async function testPing() {
        UI.mainLabel.innerText = '測量延遲...';
        setGaugeColor('var(--accent-pink)');
        let pings = [];
        for (let i = 0; i < 10; i++) {
            let start = performance.now();
            try {
                await fetch(`https://speed.cloudflare.com/__down?bytes=0&cache=${Math.random()}`);
                pings.push(performance.now() - start);
            } catch (e) {}
        }
        if (pings.length === 0) return;
        let avgPing = pings.reduce((a, b) => a + b) / pings.length;
        UI.pingVal.innerText = `${Math.round(avgPing)} ms`;
        let jitterSum = 0;
        for (let i = 1; i < pings.length; i++) jitterSum += Math.abs(pings[i] - pings[i - 1]);
        UI.jitterVal.innerText = `${Math.round(jitterSum / (pings.length - 1))} ms`;
    }

    async function testDownload() {
        UI.mainLabel.innerText = '下載測試中...';
        setGaugeColor('var(--primary-cyan)');
        const testBytes = 25 * 1024 * 1024;
        const start = performance.now();
        try {
            const response = await fetch(`https://speed.cloudflare.com/__down?bytes=${testBytes}&cb=${Math.random()}`);
            const reader = response.body.getReader();
            let loaded = 0;
            while (true) {
                const { done, value } = await reader.read();
                if (done) break;
                loaded += value.length;
                let duration = (performance.now() - start) / 1000;
                if (duration > 0.1) {
                    let mbps = (loaded * 8 / 1000000) / duration;
                    UI.mainVal.innerText = mbps.toFixed(1);
                    UI.dlVal.innerText = mbps.toFixed(1);
                    updateGauge(mbps, 300);
                }
            }
        } catch (e) { console.error(e); }
    }

    async function testUpload() {
    UI.mainLabel.innerText = '上傳測試中...';
    setGaugeColor('var(--accent-green)');
    
    const numChunks = 5; // 將數據拆成 5 份上傳
    const chunkSize = 1024 * 1024; // 每份 1MB
    const data = new Uint8Array(chunkSize);
    for (let i = 0; i < chunkSize; i++) data[i] = Math.floor(Math.random() * 256);

    let totalLoaded = 0;
    const start = performance.now();

    try {
        for (let i = 0; i < numChunks; i++) {
            // 每次上傳一小塊
            await fetch(`https://speed.cloudflare.com/__up?cb=${Math.random()}`, {
                method: 'POST',
                body: data,
                mode: 'no-cors',
                cache: 'no-store'
            });

            totalLoaded += chunkSize;
            
            // 每傳完一塊，就計算一次當前速度並更新 UI
            let duration = (performance.now() - start) / 1000;
            if (duration > 0) {
                let mbps = (totalLoaded * 8 / 1000000) / duration;
                UI.mainVal.innerText = mbps.toFixed(1);
                UI.ulVal.innerText = mbps.toFixed(1);
                updateGauge(mbps, 60); // 讓指針動起來
            }
        }

        const finalDuration = (performance.now() - start) / 1000;
        const finalMbps = (totalLoaded * 8 / 1000000) / finalDuration;
        
        UI.mainVal.innerText = finalMbps.toFixed(1);
        UI.ulVal.innerText = finalMbps.toFixed(1);
        return finalMbps;

    } catch (e) {
        console.error("Upload error:", e);
        UI.ulVal.innerText = 'Error';
        return 0;
    }
}

    async function runRealSpeedTest() {
        UI.btn.disabled = true;
        UI.btn.innerText = '測試中...';
        UI.dlVal.innerText = '0.0'; UI.ulVal.innerText = '0.0';
        try {
            await testPing();
            await testDownload();
            await testUpload();
            UI.mainLabel.innerText = '測試完成';
            setGaugeColor('var(--text-main)');
            updateGauge(0);
        } catch (e) { UI.mainLabel.innerText = '錯誤'; }
        UI.btn.disabled = false;
        UI.btn.innerText = '▶ 重新測試';
    }

    UI.btn.addEventListener('click', runRealSpeedTest);

    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('sw.js').then(reg => {
                reg.onupdatefound = () => {
                    const installingWorker = reg.installing;
                    installingWorker.onstatechange = () => {
                        if (installingWorker.state === 'installed' && navigator.serviceWorker.controller) {
                            location.reload();
                        }
                    };
                };
            });
        });
    }
</script>
</body>
</html>
