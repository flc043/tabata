<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tabata Timer Pro</title>
    
    <!-- PWA 與 行動裝置優化 -->
    <link rel="manifest" href="./manifest.json">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0f1218">

    <style>
        :root {
            --bg-color: #0f1218;
            --card-bg: #1c222d;
            --accent-blue: #54b4ff;
            --ready-color: #ffb300;
            --work-color: #ff4747;
            --rest-color: #4caf50;
            --text-main: #ffffff;
            --text-dim: #8e94a0;
        }

        * { box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg-color); color: var(--text-main); margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden; }

        .container { width: 100%; max-width: 450px; padding: 25px; height: 100vh; display: flex; flex-direction: column; }

        /* 設定畫面 */
        #setup-screen { display: flex; flex-direction: column; gap: 12px; animation: fadeIn 0.5s; }
        .input-group { background: var(--card-bg); padding: 18px; border-radius: 20px; display: flex; flex-direction: column; }
        .label { color: var(--text-dim); font-size: 14px; margin-bottom: 5px; font-weight: 500; }
        .value-control { display: flex; align-items: center; justify-content: space-between; font-size: 32px; font-weight: 800; }
        input[type="number"] { background: transparent; border: none; color: white; font-size: 36px; width: 100px; text-align: left; outline: none; font-weight: 800; }
        .unit { font-size: 16px; color: var(--text-dim); margin-left: 5px; }

        .start-btn { 
            background: var(--accent-blue); color: #000; border: none; border-radius: 50px; 
            padding: 20px; font-size: 20px; font-weight: bold; margin-top: auto; margin-bottom: 20px; cursor: pointer;
            box-shadow: 0 10px 20px rgba(84, 180, 255, 0.2);
        }

        /* 計時器畫面 */
        #timer-screen { display: none; flex-direction: column; align-items: center; justify-content: center; text-align: center; height: 100%; animation: fadeIn 0.5s; }
        
        .progress-container { position: relative; width: 300px; height: 300px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        svg { transform: rotate(-90deg); width: 100%; height: 100%; }
        circle { fill: none; stroke-width: 10; stroke-linecap: round; }
        .bg-circle { stroke: #2a313d; }
        .progress-circle { stroke: var(--ready-color); transition: stroke-dashoffset 0.1s linear, stroke 0.3s; }

        .status-badge { 
            position: absolute; top: 75px; padding: 5px 18px; border-radius: 10px; 
            font-weight: 800; font-size: 14px; color: #000; letter-spacing: 1px;
        }
        .timer-display { font-size: 84px; font-weight: 800; margin: 10px 0; letter-spacing: -2px; }
        .cycle-info { color: var(--text-dim); font-size: 20px; font-weight: 500; }

        .controls { display: flex; gap: 15px; width: 100%; margin-top: 60px; }
        .control-btn { flex: 1; padding: 18px; border-radius: 50px; border: 2.5px solid #3d4656; background: transparent; color: white; font-size: 18px; font-weight: bold; cursor: pointer; }
        .btn-end { border-color: var(--work-color); color: var(--work-color); }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="container">
    <!-- 設定畫面 -->
    <div id="setup-screen">
        <div class="input-group">
            <div class="label">準備時間 PREPARE</div>
            <div class="value-control"><input type="number" id="prepTime" value="5"><span class="unit">秒 SEC</span></div>
        </div>
        <div class="input-group">
            <div class="label">運動時間 WORK</div>
            <div class="value-control"><input type="number" id="workTime" value="20"><span class="unit">秒 SEC</span></div>
        </div>
        <div class="input-group">
            <div class="label">休息時間 REST</div>
            <div class="value-control"><input type="number" id="restTime" value="10"><span class="unit">秒 SEC</span></div>
        </div>
        <div class="input-group">
            <div class="label">循環組數 SETS</div>
            <div class="value-control"><input type="number" id="totalCycles" value="8"><span class="unit">組 SETS</span></div>
        </div>
        <button class="start-btn" onclick="startWorkout()">開始運動 START</button>
    </div>

    <!-- 計時器畫面 -->
    <div id="timer-screen">
        <div class="progress-container">
            <svg>
                <circle class="bg-circle" cx="150" cy="150" r="135"></circle>
                <circle id="progress-bar" class="progress-circle" cx="150" cy="150" r="135"></circle>
            </svg>
            <div id="status-label" class="status-badge" style="background: var(--ready-color);">準備 READY</div>
            <div id="timer-text" class="timer-display">00:05</div>
            <div id="cycle-text" class="cycle-info">第 1 / 8 組</div>
        </div>

        <div class="controls">
            <button id="pause-btn" class="control-btn" onclick="togglePause()">暫停 PAUSE</button>
            <button class="control-btn btn-end" onclick="endWorkout()">結束 END</button>
        </div>
    </div>
</div>

<script>
    // --- 變數宣告 (全域只宣告一次) ---
    let timer;
    let timeLeft;
    let currentCycle = 1;
    let isPaused = false;
    let phase = 'READY'; 
    let wakeLock = null;
    
    const settings = { prep: 0, work: 0, rest: 0, cycles: 0 };
    const circle = document.getElementById('progress-bar');
    const radius = circle.r.baseVal.value;
    const circumference = 2 * Math.PI * radius;

    circle.style.strokeDasharray = `${circumference} ${circumference}`;

    // --- Wake Lock 螢幕長亮控制 ---
    async function requestWakeLock() {
        try {
            if ('wakeLock' in navigator) {
                wakeLock = await navigator.wakeLock.request('screen');
                console.log('螢幕長亮已啟動');
            }
        } catch (err) {
            console.error(`${err.name}: ${err.message}`);
        }
    }

    function releaseWakeLock() {
        if (wakeLock !== null) {
            wakeLock.release().then(() => {
                wakeLock = null;
                console.log('螢幕長亮已關閉');
            });
        }
    }

    // --- 計時器邏輯 ---
    function startWorkout() {
        // 取得輸入值
        settings.prep = parseInt(document.getElementById('prepTime').value) || 5;
        settings.work = parseInt(document.getElementById('workTime').value) || 20;
        settings.rest = parseInt(document.getElementById('restTime').value) || 10;
        settings.cycles = parseInt(document.getElementById('totalCycles').value) || 8;

        // 畫面切換
        document.getElementById('setup-screen').classList.add('hidden');
        document.getElementById('timer-screen').style.display = 'flex';

        currentCycle = 1;
        isPaused = false;
        
        // 請求長亮
        requestWakeLock();
        
        // 開始第一階段：準備
        startPhase('READY', settings.prep);
    }

    function startPhase(newPhase, duration) {
        phase = newPhase;
        timeLeft = duration;
        updateUI();
        
        if (timer) clearInterval(timer);
        timer = setInterval(() => {
            if (!isPaused) {
                timeLeft--;
                if (timeLeft < 0) {
                    nextPhase();
                } else {
                    updateUI();
                }
            }
        }, 1000);
    }

    function nextPhase() {
        if (phase === 'READY') {
            startPhase('WORK', settings.work);
        } else if (phase === 'WORK') {
            if (settings.rest > 0) {
                startPhase('REST', settings.rest);
            } else {
                handleCycleIncrement();
            }
        } else if (phase === 'REST') {
            handleCycleIncrement();
        }
    }

    function handleCycleIncrement() {
        currentCycle++;
        if (currentCycle > settings.cycles) {
            finishWorkout();
        } else {
            startPhase('WORK', settings.work);
        }
    }

    function updateUI() {
        const timerText = document.getElementById('timer-text');
        const statusLabel = document.getElementById('status-label');
        const cycleText = document.getElementById('cycle-text');
        
        // 格式化時間
        let m = Math.floor(timeLeft / 60);
        let s = timeLeft % 60;
        timerText.innerText = `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
        cycleText.innerText = `第 ${currentCycle} / ${settings.cycles} 組`;

        // 更新狀態與顏色
        let color, labelText, total;
        if (phase === 'READY') {
            color = 'var(--ready-color)'; labelText = '準備 READY'; total = settings.prep;
        } else if (phase === 'WORK') {
            color = 'var(--work-color)'; labelText = '運動 WORK'; total = settings.work;
        } else {
            color = 'var(--rest-color)'; labelText = '休息 REST'; total = settings.rest;
        }

        circle.style.stroke = color;
        statusLabel.style.background = color;
        statusLabel.innerText = labelText;

        // 進度條動畫
        const offset = circumference - (timeLeft / total) * circumference;
        circle.style.strokeDashoffset = offset;
    }

    function togglePause() {
        isPaused = !isPaused;
        document.getElementById('pause-btn').innerText = isPaused ? '繼續 RESUME' : '暫停 PAUSE';
        document.getElementById('pause-btn').style.borderColor = isPaused ? 'var(--accent-blue)' : '#3d4656';
    }

    function endWorkout() {
        if (confirm("確定要結束運動嗎？")) {
            finishWorkout();
        }
    }

    function finishWorkout() {
        clearInterval(timer);
        releaseWakeLock();
        document.getElementById('setup-screen').classList.remove('hidden');
        document.getElementById('timer-screen').style.display = 'none';
        document.getElementById('pause-btn').innerText = '暫停 PAUSE';
    }

    // --- PWA Service Worker 註冊 ---
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('./sw.js').then(() => console.log("PWA Ready"));
        });
    }
</script>

</body>
</html>
