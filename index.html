<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta http-equiv="Content-Security-Policy" content="default-src * 'unsafe-inline' 'unsafe-eval'; script-src * 'unsafe-inline' 'unsafe-eval'; connect-src * 'unsafe-inline'; img-src * data: blob: 'unsafe-inline'; media-src * data: blob:;">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tabata Pro</title>
    <link rel="manifest" href="./manifest.json">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0f1218">
    <style>
        :root {
            --bg-color: #0f1218; --card-bg: #1c222d; --accent-blue: #54b4ff;
            --ready-color: #ffb300; --work-color: #ff4747; --rest-color: #4caf50;
            --text-main: #ffffff; --text-dim: #8e94a0;
        }
        * { box-sizing: border-box; font-family: sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg-color); color: var(--text-main); margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden; }
        .container { width: 100%; max-width: 450px; padding: 20px; height: 100vh; display: flex; flex-direction: column; }
        #setup-screen { display: flex; flex-direction: column; gap: 12px; height: 100%; }
        .input-group { background: var(--card-bg); padding: 18px; border-radius: 18px; display: flex; flex-direction: column; }
        .label { color: var(--text-dim); font-size: 13px; margin-bottom: 5px; font-weight: 600; }
        .value-control { display: flex; align-items: center; justify-content: space-between; }
        input[type="number"] { background: transparent; border: none; color: white; font-size: 38px; width: 120px; outline: none; font-weight: 800; }
        .unit { font-size: 16px; color: var(--text-dim); }
        .start-btn { background: var(--accent-blue); color: #000; border: none; border-radius: 50px; padding: 20px; font-size: 20px; font-weight: 900; margin-top: auto; margin-bottom: 20px; cursor: pointer; }
        #timer-screen { display: none; flex-direction: column; align-items: center; justify-content: center; height: 100%; }
        .progress-container { position: relative; width: 320px; height: 320px; display: flex; align-items: center; justify-content: center; }
        svg { transform: rotate(-90deg); width: 100%; height: 100%; position: absolute; }
        circle { fill: none; stroke-width: 12; stroke-linecap: round; }
        .bg-circle { stroke: #2a313d; }
        .progress-circle { stroke: var(--ready-color); transition: stroke-dashoffset 0.1s linear, stroke 0.3s; }
        .status-badge { position: absolute; top: 80px; padding: 6px 20px; border-radius: 12px; font-weight: 900; font-size: 14px; color: #000; z-index: 2; }
        .timer-display { font-size: 96px; font-weight: 900; z-index: 2; }
        .cycle-info { color: var(--text-dim); font-size: 22px; margin-top: 10px; }
        .controls { display: flex; gap: 15px; width: 100%; margin-top: 50px; }
        .control-btn { flex: 1; padding: 18px; border-radius: 50px; border: 2.5px solid #3d4656; background: transparent; color: white; font-size: 18px; font-weight: 800; }
        .btn-end { border-color: var(--work-color); color: var(--work-color); }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="container">
    <div id="setup-screen">
        <div class="input-group"><div class="label">準備 PREPARE</div><div class="value-control"><input type="number" id="prepTime" value="5"><span class="unit">秒</span></div></div>
        <div class="input-group"><div class="label">運動 WORK</div><div class="value-control"><input type="number" id="workTime" value="20"><span class="unit">秒</span></div></div>
        <div class="input-group"><div class="label">休息 REST</div><div class="value-control"><input type="number" id="restTime" value="10"><span class="unit">秒</span></div></div>
        <div class="input-group"><div class="label">組數 ROUNDS</div><div class="value-control"><input type="number" id="totalCycles" value="8"><span class="unit">組</span></div></div>
        <button class="start-btn" onclick="startWorkout()">開始運動 START</button>
    </div>

    <div id="timer-screen">
        <div class="progress-container">
            <svg viewBox="0 0 340 340"><circle class="bg-circle" cx="170" cy="170" r="150"></circle><circle id="progress-bar" class="progress-circle" cx="170" cy="170" r="150"></circle></svg>
            <div id="status-label" class="status-badge">READY</div>
            <div id="timer-text" class="timer-display">00:00</div>
        </div>
        <div id="cycle-text" class="cycle-info">第 1 / 8 組</div>
        <div class="controls">
            <button id="pause-btn" class="control-btn" onclick="togglePause()">暫停</button>
            <button class="control-btn btn-end" onclick="endWorkout()">結束</button>
        </div>
    </div>
</div>

<script>
    let timer = null, timeLeft = 0, currentCycle = 1, isPaused = false, phase = 'READY', wakeLock = null;
    
    // --- 音效設定 ---
    const soundStart = new Audio('start.mp3'); // 階段開始音效
    const soundCount = new Audio('count.mp3'); // 倒數音效

    function playSound(audio) {
        audio.currentTime = 0;
        audio.play().catch(e => console.log("音訊播放被攔截:", e));
    }

    const circle = document.getElementById('progress-bar');
    const circumference = 2 * Math.PI * 150;
    circle.style.strokeDasharray = circumference;

    async function requestWakeLock() {
        if ('wakeLock' in navigator) { try { wakeLock = await navigator.wakeLock.request('screen'); } catch (err) {} }
    }

    function startWorkout() {
        // 解鎖行動裝置音訊 (必須在使用者點擊時執行)
        soundStart.play(); soundStart.pause();
        soundCount.play(); soundCount.pause();

        const p = parseInt(document.getElementById('prepTime').value) || 0;
        const w = parseInt(document.getElementById('workTime').value) || 0;
        const r = parseInt(document.getElementById('restTime').value) || 0;
        const c = parseInt(document.getElementById('totalCycles').value) || 1;
        window.sets = { p, w, r, c };

        document.getElementById('setup-screen').classList.add('hidden');
        document.getElementById('timer-screen').style.display = 'flex';
        currentCycle = 1; isPaused = false;
        requestWakeLock();
        startPhase('READY', p);
    }

    function startPhase(newPhase, duration) {
        phase = newPhase; timeLeft = duration;
        updateUI();
        playSound(soundStart); // 切換階段播放音效

        if (timer) clearInterval(timer);
        timer = setInterval(() => {
            if (!isPaused) {
                timeLeft--;
                if (timeLeft >= 1 && timeLeft <= 3) playSound(soundCount); // 最後 3 秒倒數
                if (timeLeft < 0) nextPhase();
                else updateUI();
            }
        }, 1000);
    }

    function nextPhase() {
        const s = window.sets;
        if (phase === 'READY') startPhase('WORK', s.w);
        else if (phase === 'WORK') s.r > 0 ? startPhase('REST', s.r) : addCycle();
        else if (phase === 'REST') addCycle();
    }

    function addCycle() {
        currentCycle++;
        if (currentCycle > window.sets.c) finishWorkout();
        else startPhase('WORK', window.sets.w);
    }

    function updateUI() {
        const m = Math.floor(timeLeft / 60), s = timeLeft % 60;
        document.getElementById('timer-text').innerText = `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
        document.getElementById('cycle-text').innerText = `第 ${currentCycle} / ${window.sets.c} 組`;
        
        let color, label, total;
        if(phase==='READY'){ color='var(--ready-color)'; label='準備 READY'; total=window.sets.p; }
        else if(phase==='WORK'){ color='var(--work-color)'; label='運動 WORK'; total=window.sets.w; }
        else { color='var(--rest-color)'; label='休息 REST'; total=window.sets.r; }

        circle.style.stroke = color;
        const labelEl = document.getElementById('status-label');
        labelEl.innerText = label; labelEl.style.background = color;
        circle.style.strokeDashoffset = total > 0 ? circumference - (timeLeft/total)*circumference : 0;
    }

    function togglePause() { isPaused = !isPaused; document.getElementById('pause-btn').innerText = isPaused ? '繼續' : '暫停'; }
    function endWorkout() { if(confirm("結束？")) finishWorkout(); }
    function finishWorkout() {
        clearInterval(timer); if(wakeLock) wakeLock.release();
        document.getElementById('setup-screen').classList.remove('hidden');
        document.getElementById('timer-screen').style.display = 'none';
    }

    if ('serviceWorker' in navigator) { window.addEventListener('load', () => navigator.serviceWorker.register('./sw.js')); }
</script>
</body>
</html>
