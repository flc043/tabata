<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <!-- PWA 相關設定 -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#54b4ff">
<link rel="apple-touch-icon" href="icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<script>
  // 註冊 Service Worker
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js')
      .then(() => console.log("Service Worker Registered"));
  }

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tabata 計時器 Pro</title>
    <!-- 資訊安全強化：內容安全策略 (CSP) 阻擋跨站腳本攻擊 (XSS) 與未授權的外部連線 -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'unsafe-inline'; style-src 'unsafe-inline'; img-src 'self' data:; media-src 'self' data:; connect-src 'none'; font-src 'none'; object-src 'none'; base-uri 'none'; form-action 'none'; require-trusted-types-for 'script';">
    <!-- 資訊安全強化：不傳送 Referrer 資訊 -->
    <meta name="referrer" content="no-referrer">
    <style>
        :root {
            --bg-color: #0b111a;
            --card-bg: #1c2433;
            --sheet-bg: #222c3d;
            --text-main: #ffffff;
            --text-muted: #8b95a5;
            --accent-color: #4db8ff;
            --color-ready: #ff9800; /* 橘色 */
            --color-work: #f44336;  /* 紅色 */
            --color-rest: #4caf50;  /* 綠色 */
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            height: 100dvh;
            overflow: hidden;
        }

        #app-container {
            width: 100%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            position: relative;
            padding: 20px;
        }

        /* --- 設定畫面 --- */
        #settings-view {
            display: flex;
            flex-direction: column;
            flex-grow: 1;
            overflow-y: auto;
            padding-bottom: 80px;
        }

        .card {
            background-color: var(--card-bg);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 16px;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        .card:active { background-color: #2a3548; }

        .card-title {
            color: var(--text-muted);
            font-size: 13px;
            margin-bottom: 8px;
            letter-spacing: 0.5px;
        }

        .card-value {
            font-size: 36px;
            font-weight: 500;
            margin-bottom: 8px;
        }

        .card-edit {
            color: var(--accent-color);
            font-size: 12px;
            font-weight: 500;
        }

        .start-btn {
            background-color: var(--accent-color);
            color: #000;
            border: none;
            border-radius: 30px;
            padding: 18px;
            font-size: 18px;
            font-weight: bold;
            width: calc(100% - 40px);
            position: absolute;
            bottom: 20px;
            left: 20px;
            cursor: pointer;
            z-index: 10;
        }

        /* --- 底部選擇器 (Picker Sheet) --- */
        #picker-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.6);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
            z-index: 100;
        }
        #picker-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        #picker-sheet {
            position: fixed;
            bottom: -100%; left: 50%;
            transform: translateX(-50%);
            width: 100%; max-width: 400px;
            background: var(--sheet-bg);
            border-radius: 24px 24px 0 0;
            padding: 20px;
            transition: bottom 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
            z-index: 101;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        #picker-sheet.active { bottom: 0; }

        .picker-handle {
            width: 40px; height: 4px;
            background: #4a5568;
            border-radius: 2px;
            margin-bottom: 20px;
        }

        .picker-title {
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 20px;
            letter-spacing: 1px;
        }

        .picker-columns {
            display: flex;
            width: 100%;
            justify-content: center;
            gap: 20px;
            margin-bottom: 20px;
            position: relative;
        }
        
        /* 選擇器中間的高光框 */
        .picker-selection-window {
            position: absolute;
            top: 50%; left: 0; right: 0;
            height: 50px;
            transform: translateY(-50%);
            border-top: 1px solid rgba(255,255,255,0.1);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            pointer-events: none;
        }

        .picker-col-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .picker-label {
            font-size: 12px;
            color: var(--text-muted);
            margin-bottom: 10px;
        }

        .picker-scroll {
            height: 150px; /* 顯示 3 個選項 (50px * 3) */
            width: 80px;
            overflow-y: scroll;
            scroll-snap-type: y mandatory;
            scrollbar-width: none; /* Firefox 隱藏捲軸 */
        }
        .picker-scroll::-webkit-scrollbar { display: none; } /* Chrome 隱藏捲軸 */

        .picker-item {
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            color: var(--text-muted);
            scroll-snap-align: center;
            transition: color 0.2s, font-size 0.2s;
        }
        /* 留白用的假元素 */
        .picker-spacer { height: 50px; scroll-snap-align: center; }

        .confirm-btn {
            background-color: var(--accent-color);
            color: #000;
            border: none;
            border-radius: 30px;
            padding: 15px;
            font-size: 16px;
            font-weight: bold;
            width: 100%;
            cursor: pointer;
        }

        /* --- 計時畫面 --- */
        #timer-view {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex-grow: 1;
        }

        .timer-circle-container {
            position: relative;
            width: 280px;
            height: 280px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        svg.progress-ring {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            transform: rotate(-90deg);
        }

        .progress-ring__bg {
            fill: transparent;
            stroke: #2a3548;
            stroke-width: 8;
        }

        .progress-ring__circle {
            fill: transparent;
            stroke: var(--color-ready);
            stroke-width: 12;
            stroke-linecap: round;
            transition: stroke-dashoffset 0.1s linear, stroke 0.3s;
        }

        .timer-content {
            position: relative;
            z-index: 2;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .status-badge {
            background-color: var(--color-ready);
            color: #000;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: bold;
            margin-bottom: 10px;
            transition: background-color 0.3s;
        }

        #time-display {
            font-size: 72px;
            font-weight: bold;
            margin-bottom: 5px;
            font-variant-numeric: tabular-nums;
            line-height: 1;
        }

        #round-display {
            font-size: 14px;
            color: var(--text-muted);
            letter-spacing: 1px;
        }

        .controls {
            display: flex;
            gap: 20px;
            margin-top: 50px;
            width: 100%;
            padding: 0 20px;
        }

        .ctrl-btn {
            flex: 1;
            background: transparent;
            border: 2px solid var(--text-muted);
            color: var(--text-main);
            border-radius: 30px;
            padding: 15px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }
        .ctrl-btn.end { border-color: #f44336; color: #f44336; }
    </style>
</head>
<body>

<div id="app-container">
    <div id="settings-view">
        <div class="card" id="card-prepare" data-key="prepare" data-title="選擇 PREP" data-istime="true">
            <div class="card-title">準備時間 PREPARE</div>
            <div class="card-value" id="val-prepare">00:05</div>
            <div class="card-edit">點擊調整 TAP TO EDIT</div>
        </div>
        <div class="card" id="card-exercise" data-key="exercise" data-title="選擇 WORK" data-istime="true">
            <div class="card-title">運動時間 EXERCISE</div>
            <div class="card-value" id="val-exercise">00:05</div>
            <div class="card-edit">點擊調整 TAP TO EDIT</div>
        </div>
        <div class="card" id="card-rest" data-key="rest" data-title="選擇 REST" data-istime="true">
            <div class="card-title">休息時間 REST</div>
            <div class="card-value" id="val-rest">00:05</div>
            <div class="card-edit">點擊調整 TAP TO EDIT</div>
        </div>
        <div class="card" id="card-rounds" data-key="rounds" data-title="選擇 ROUNDS" data-istime="false">
            <div class="card-title">循環組數 ROUNDS</div>
            <div class="card-value" id="val-rounds">2 Sets</div>
            <div class="card-edit">點擊調整 TAP TO EDIT</div>
        </div>
        
        <button class="start-btn" id="start-btn">開始運動 START</button>
    </div>

    <div id="timer-view">
        <div class="timer-circle-container">
            <svg class="progress-ring" viewBox="0 0 200 200">
                <circle class="progress-ring__bg" cx="100" cy="100" r="90"></circle>
                <circle class="progress-ring__circle" id="progress-circle" cx="100" cy="100" r="90"></circle>
            </svg>
            <div class="timer-content">
                <div class="status-badge" id="status-badge">準備開始 READY</div>
                <div id="time-display">00:00</div>
                <div id="round-display">組數 ROUND 01 / 02</div>
            </div>
        </div>

        <div class="controls">
            <button class="ctrl-btn" id="pause-btn">暫停 PAUSE</button>
            <button class="ctrl-btn end" id="stop-btn">結束 END</button>
        </div>
    </div>
</div>

<div id="picker-overlay"></div>
<div id="picker-sheet">
    <div class="picker-handle"></div>
    <div class="picker-title" id="picker-title">選擇</div>
    <div class="picker-columns" id="picker-columns-container">
        <div class="picker-selection-window"></div>
    </div>
    <button class="confirm-btn" id="confirm-btn">確認完成 DONE</button>
</div>

<script>
    let settings = { prepare: 5, exercise: 5, rest: 5, rounds: 2 };
    
    // 計時器變數
    let timerInterval;
    let finishTimeout;
    let wakeLock = null;
    let currentPhase = ''; 
    let currentRound = 1;
    let expectedEndTime = 0;
    let lastSecondsLeft = -1;
    let totalTimeForPhase = 0;
    
    // 暫停變數
    let isPaused = false;
    let remainingMsWhenPaused = 0;

    // SVG 圓環設定
    const circle = document.getElementById('progress-circle');
    const radius = circle.r.baseVal.value;
    const circumference = radius * 2 * Math.PI;
    circle.style.strokeDasharray = `${circumference} ${circumference}`;
    circle.style.strokeDashoffset = circumference;

    // --- 螢幕喚醒 (Wake Lock) ---
    async function requestWakeLock() {
        try {
            if ('wakeLock' in navigator) {
                wakeLock = await navigator.wakeLock.request('screen');
            }
        } catch (err) {
            console.log('Wake Lock error:', err);
        }
    }

    function releaseWakeLock() {
        if (wakeLock !== null) {
            wakeLock.release().catch(() => {});
            wakeLock = null;
        }
    }

    document.addEventListener('visibilitychange', async () => {
        if (wakeLock !== null && document.visibilityState === 'visible') {
            requestWakeLock();
        }
    });

    // --- 音效系統 (包含全部音效合成) ---
    let audioCtx;
    function initAudio() {
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            // 播放無聲音頻以解鎖 iOS 限制
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            gain.gain.value = 0;
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start(0);
            osc.stop(0.001);
        }
        if (audioCtx.state === 'suspended') audioCtx.resume();
    }

    // 1. 倒數滴聲
    function playDigitalBeep() {
        if (!audioCtx) return;
        const t = audioCtx.currentTime;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'square'; 
        osc.frequency.setValueAtTime(2048, t); 
        gain.gain.setValueAtTime(0.1, t);
        gain.gain.exponentialRampToValueAtTime(0.001, t + 0.15); 
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(t); osc.stop(t + 0.15);
    }

    // 2. 切換哨音
    function playRealisticWhistle() {
        if (!audioCtx) return;
        const t = audioCtx.currentTime;
        const osc = audioCtx.createOscillator(); osc.type = 'triangle';
        osc.frequency.setValueAtTime(2000, t);
        osc.frequency.linearRampToValueAtTime(2600, t + 0.1);
        osc.frequency.setValueAtTime(2600, t + 0.4);
        osc.frequency.exponentialRampToValueAtTime(2000, t + 0.6);
        const lfo = audioCtx.createOscillator(); lfo.type = 'sine'; lfo.frequency.value = 60; 
        const lfoGain = audioCtx.createGain(); lfoGain.gain.value = 150; 
        lfo.connect(lfoGain); lfoGain.connect(osc.frequency);
        const gainNode = audioCtx.createGain();
        gainNode.gain.setValueAtTime(0, t);
        gainNode.gain.linearRampToValueAtTime(0.5, t + 0.05);
        gainNode.gain.setValueAtTime(0.5, t + 0.4);
        gainNode.gain.linearRampToValueAtTime(0, t + 0.6);
        osc.connect(gainNode); gainNode.connect(audioCtx.destination);
        osc.start(t); lfo.start(t); osc.stop(t + 0.6); lfo.stop(t + 0.6);
    }

    // 預先載入音效
    boxingBellAudio.preload = 'auto';

    function playBoxingBell() {
        // 重置播放進度
        boxingBellAudio.currentTime = 0;
        // 播放音效
        boxingBellAudio.play().catch(error => {
            console.error("無法播放音效，可能是瀏覽器自動播放限制:", error);
            // 若失敗則退回原有的合成音效作為備案
            if (!audioCtx) return;
            const t = audioCtx.currentTime;
            const freqs = [600, 800, 1200, 1600, 2400, 3200];
            const gains = [0.5, 0.4, 0.3, 0.2, 0.1, 0.05];
            const strike = (startTime) => {
                freqs.forEach((f, i) => {
                    const osc = audioCtx.createOscillator();
                    const g = audioCtx.createGain();
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(f, startTime);
                    g.gain.setValueAtTime(0, startTime);
                    g.gain.linearRampToValueAtTime(gains[i], startTime + 0.01);
                    g.gain.exponentialRampToValueAtTime(0.001, startTime + 2.0);
                    osc.connect(g); g.connect(audioCtx.destination);
                    osc.start(startTime); osc.stop(startTime + 2.0);
                });
            };
            strike(t); strike(t + 0.4); strike(t + 0.8);
        });

    singleBoxingBellAudio.preload = 'auto';

    function playSingleBoxingBell() {
        // 嘗試播放真實音效
        singleBoxingBellAudio.currentTime = 0;
        singleBoxingBellAudio.play().catch(error => {
            // 若失敗則退回原有的合成音效作為備案 (單響)
            if (!audioCtx) return;
            const t = audioCtx.currentTime;
            const freqs = [600, 800, 1200, 1600, 2400, 3200];
            const gains = [0.5, 0.4, 0.3, 0.2, 0.1, 0.05];
            freqs.forEach((f, i) => {
                const osc = audioCtx.createOscillator();
                const g = audioCtx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(f, t);
                g.gain.setValueAtTime(0, t);
                g.gain.linearRampToValueAtTime(gains[i], t + 0.01);
                g.gain.exponentialRampToValueAtTime(0.001, t + 2.0);
                osc.connect(g); g.connect(audioCtx.destination);
                osc.start(t); osc.stop(t + 2.0);
            });
        });
    }

    // --- 格式化工具 ---
    function formatTime(seconds) {
        const m = Math.floor(seconds / 60).toString().padStart(2, '0');
        const s = (seconds % 60).toString().padStart(2, '0');
        return `${m}:${s}`;
    }

    function updateSettingsUI() {
        document.getElementById('val-prepare').innerText = formatTime(settings.prepare);
        document.getElementById('val-exercise').innerText = formatTime(settings.exercise);
        document.getElementById('val-rest').innerText = formatTime(settings.rest);
        document.getElementById('val-rounds').innerText = `${settings.rounds} Sets`;
    }

    // --- Trusted Types 資訊安全強化 ---
    let ttPolicy;
    if (window.trustedTypes && trustedTypes.createPolicy) {
        ttPolicy = trustedTypes.createPolicy('default', {
            createHTML: (string) => string // 在實際應用中應考慮使用 DOMPurify 等庫來進行清洗
        });
    }
    const safeHTML = (htmlStr) => ttPolicy ? ttPolicy.createHTML(htmlStr) : htmlStr;

    // --- 滾輪選擇器邏輯 (Picker) ---
    let currentEditingKey = '';
    let isTimePicker = true;
    
    function createScrollList(maxVal, id) {
        let html = `<div class="picker-col-wrapper"><div class="picker-label">${id==='min'?'MIN':(id==='sec'?'SEC':'SETS')}</div><div class="picker-scroll" id="scroll-${id}">`;
        html += `<div class="picker-spacer"></div>`; // 頂部留白
        for(let i=0; i<=maxVal; i++) {
            html += `<div class="picker-item" data-val="${i}">${i.toString().padStart(2, '0')}</div>`;
        }
        html += `<div class="picker-spacer"></div>`; // 底部留白
        html += `</div></div>`;
        return html;
    }

    function openPicker(key, title, isTime) {
        initAudio(); // 趁機喚醒音效
        currentEditingKey = key;
        isTimePicker = isTime;
        document.getElementById('picker-title').innerText = title;
        
        const container = document.getElementById('picker-columns-container');
        if (isTimePicker) {
            container.innerHTML = safeHTML(createScrollList(59, 'min') + createScrollList(59, 'sec'));
        } else {
            container.innerHTML = safeHTML(createScrollList(99, 'sets'));
        }

        // 動態綁定 scroll 事件以取代 onscroll inline handler
        const scrollEls = container.querySelectorAll('.picker-scroll');
        scrollEls.forEach(el => el.addEventListener('scroll', function() { highlightCenter(this); }));

        document.getElementById('picker-overlay').classList.add('active');
        document.getElementById('picker-sheet').classList.add('active');

        // 滾動到當前數值
        setTimeout(() => {
            let val = settings[key];
            if (isTimePicker) {
                document.getElementById('scroll-min').scrollTop = Math.floor(val / 60) * 50;
                document.getElementById('scroll-sec').scrollTop = (val % 60) * 50;
            } else {
                // 如果是組數，確保最小是1
                if (val < 1) val = 1;
                document.getElementById('scroll-sets').scrollTop = val * 50;
            }
        }, 10);
    }

    function closePicker() {
        document.getElementById('picker-overlay').classList.remove('active');
        document.getElementById('picker-sheet').classList.remove('active');
    }

    function confirmPicker() {
        if (isTimePicker) {
            let m = Math.round(document.getElementById('scroll-min').scrollTop / 50);
            let s = Math.round(document.getElementById('scroll-sec').scrollTop / 50);
            let total = (m * 60) + s;
            if (total === 0) total = 1; // 避免設為0秒
            settings[currentEditingKey] = total;
        } else {
            let sets = Math.round(document.getElementById('scroll-sets').scrollTop / 50);
            if (sets === 0) sets = 1;
            settings[currentEditingKey] = sets;
        }
        updateSettingsUI();
        closePicker();
    }

    // 簡單的滾動高亮效果 (為了效能，用 CSS 取代部分 JS 操作，這裡只做提示)
    function highlightCenter(el) {
        let items = el.querySelectorAll('.picker-item');
        let index = Math.round(el.scrollTop / 50);
        items.forEach((item, i) => {
            if(i === index) {
                item.style.color = "var(--accent-color)";
                item.style.fontWeight = "bold";
            } else {
                item.style.color = "var(--text-muted)";
                item.style.fontWeight = "normal";
            }
        });
    }

    // --- 計時器核心邏輯 ---
    function setCircleProgress(percent) {
        const offset = circumference - (percent * circumference);
        circle.style.strokeDashoffset = offset;
    }

    function startWorkout() {
        initAudio(); 
        requestWakeLock();
        isPaused = false;
        clearInterval(timerInterval);
        clearTimeout(finishTimeout);
        document.getElementById('pause-btn').innerText = "暫停 PAUSE";
        document.getElementById('settings-view').style.display = 'none';
        document.getElementById('timer-view').style.display = 'flex';
        
        currentRound = 1;
        setPhase('prepare');
        
        timerInterval = setInterval(tick, 50); // 提高頻率讓圓環動畫順暢
    }

    function stopWorkout() {
        clearInterval(timerInterval);
        clearTimeout(finishTimeout);
        releaseWakeLock();
        document.getElementById('settings-view').style.display = 'flex';
        document.getElementById('timer-view').style.display = 'none';
        setCircleProgress(1); // 歸位
    }

    function togglePause() {
        const btn = document.getElementById('pause-btn');
        if (isPaused) {
            // 繼續
            isPaused = false;
            btn.innerText = "暫停 PAUSE";
            expectedEndTime = Date.now() + remainingMsWhenPaused;
        } else {
            // 暫停
            isPaused = true;
            btn.innerText = "繼續 RESUME";
            remainingMsWhenPaused = expectedEndTime - Date.now();
        }
    }

    function setPhase(phase) {
        currentPhase = phase;
        totalTimeForPhase = settings[phase];
        expectedEndTime = Date.now() + (totalTimeForPhase * 1000);
        lastSecondsLeft = totalTimeForPhase;
        
        const badgeEl = document.getElementById('status-badge');
        const roundEl = document.getElementById('round-display');

        if (phase === 'prepare') {
            badgeEl.innerText = "準備開始 READY";
            badgeEl.style.backgroundColor = "var(--color-ready)";
            circle.style.stroke = "var(--color-ready)";
        } else if (phase === 'exercise') {
            badgeEl.innerText = "運動中 WORK";
            badgeEl.style.backgroundColor = "var(--color-work)";
            circle.style.stroke = "var(--color-work)";
        } else if (phase === 'rest') {
            badgeEl.innerText = "休息中 REST";
            badgeEl.style.backgroundColor = "var(--color-rest)";
            circle.style.stroke = "var(--color-rest)";
        }

        roundEl.innerText = `組數 ROUND ${currentRound.toString().padStart(2, '0')} / ${settings.rounds.toString().padStart(2, '0')}`;
        updateTimerUI(totalTimeForPhase);
        setCircleProgress(1);
    }

    function tick() {
        if (isPaused) return;

        const now = Date.now();
        const remainingMs = expectedEndTime - now;
        
        // 更新圓環進度 (平滑)
        if (totalTimeForPhase > 0) {
            let percent = Math.max(0, remainingMs / (totalTimeForPhase * 1000));
            setCircleProgress(percent);
        }

        const secondsLeft = Math.ceil(remainingMs / 1000);

        if (remainingMs <= 0) {
            nextPhase();
            return;
        }

        if (secondsLeft !== lastSecondsLeft) {
            lastSecondsLeft = secondsLeft;
            updateTimerUI(secondsLeft);

            if (secondsLeft === 3 || secondsLeft === 2 || secondsLeft === 1) {
                playDigitalBeep();
            }
        }
    }

    function updateTimerUI(seconds) {
        document.getElementById('time-display').innerText = formatTime(seconds);
    }

    function nextPhase() {
        if (currentPhase === 'prepare') {
            playRealisticWhistle();
            setPhase('exercise');
        } else if (currentPhase === 'exercise') {
            if (currentRound >= settings.rounds) {
                
                // --- 🔔 播放完賽拳擊鐘聲 ---
                playBoxingBell();
                
                clearInterval(timerInterval);
                updateTimerUI(0);
                
                // 延長跳出完成視窗的時間，讓你聽完鐘聲 (1.5秒後彈出)
                finishTimeout = setTimeout(() => {
                    alert("訓練完成！Good Job!");
                    stopWorkout();
                }, 1500); 
                
            } else {
                playSingleBoxingBell();
                setPhase('rest');
            }
        } else if (currentPhase === 'rest') {
            currentRound++;
            playRealisticWhistle();
            setPhase('exercise');
        }
    }

    // --- 事件綁定 ---
    document.getElementById('card-prepare').addEventListener('click', function() { openPicker(this.dataset.key, this.dataset.title, this.dataset.istime === 'true'); });
    document.getElementById('card-exercise').addEventListener('click', function() { openPicker(this.dataset.key, this.dataset.title, this.dataset.istime === 'true'); });
    document.getElementById('card-rest').addEventListener('click', function() { openPicker(this.dataset.key, this.dataset.title, this.dataset.istime === 'true'); });
    document.getElementById('card-rounds').addEventListener('click', function() { openPicker(this.dataset.key, this.dataset.title, this.dataset.istime === 'true'); });
    document.getElementById('start-btn').addEventListener('click', startWorkout);
    document.getElementById('pause-btn').addEventListener('click', togglePause);
    document.getElementById('stop-btn').addEventListener('click', stopWorkout);
    document.getElementById('picker-overlay').addEventListener('click', closePicker);
    document.getElementById('confirm-btn').addEventListener('click', confirmPicker);

    // 初始化
    updateSettingsUI();
</script>
</body>
</html>
