<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <!-- 1. 內容安全政策 (CSP) - 必須放在 head 最上方 -->
    <meta http-equiv="Content-Security-Policy" content="default-src * 'unsafe-inline' 'unsafe-eval'; script-src * 'unsafe-inline' 'unsafe-eval'; connect-src * 'unsafe-inline'; img-src * data: blob: 'unsafe-inline';">
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tabata Pro</title>

    <!-- PWA 設定 -->
    <link rel="manifest" href="./manifest.json">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0f1218">

    <style>
        :root {
            --bg-color: #0f1218;
            --card-bg: #1c222d;
            --accent-blue: #54b4ff;
            --ready-color: #ffb300;
            --work-color: #ff4747;
            --rest-color: #4caf50;
            --text-main: #ffffff;
            --text-dim: #8e94a0;
        }

        * { box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg-color); color: var(--text-main); margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden; }

        .container { width: 100%; max-width: 450px; padding: 20px; height: 100vh; display: flex; flex-direction: column; }

        /* 設定畫面 */
        #setup-screen { display: flex; flex-direction: column; gap: 12px; height: 100%; }
        .input-group { background: var(--card-bg); padding: 18px; border-radius: 18px; display: flex; flex-direction: column; transition: transform 0.2s; }
        .input-group:active { transform: scale(0.98); }
        .label { color: var(--text-dim); font-size: 13px; margin-bottom: 5px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }
        .value-control { display: flex; align-items: center; justify-content: space-between; }
        input[type="number"] { background: transparent; border: none; color: white; font-size: 38px; width: 120px; outline: none; font-weight: 800; }
        .unit { font-size: 16px; color: var(--text-dim); font-weight: bold; }

        .start-btn { 
            background: var(--accent-blue); color: #000; border: none; border-radius: 50px; 
            padding: 20px; font-size: 20px; font-weight: 900; margin-top: auto; margin-bottom: 20px; cursor: pointer;
            box-shadow: 0 10px 25px rgba(84, 180, 255, 0.25);
        }

        /* 計時器畫面 */
        #timer-screen { display: none; flex-direction: column; align-items: center; justify-content: center; text-align: center; height: 100%; }
        
        .progress-container { position: relative; width: 320px; height: 320px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        svg { transform: rotate(-90deg); width: 100%; height: 100%; }
        circle { fill: none; stroke-width: 12; stroke-linecap: round; }
        .bg-circle { stroke: #2a313d; }
        .progress-circle { stroke: var(--ready-color); transition: stroke-dashoffset 0.1s linear, stroke 0.3s; }

        .status-badge { 
            position: absolute; top: 80px; padding: 6px 20px; border-radius: 12px; 
            font-weight: 900; font-size: 14px; color: #000;
        }
        .timer-display { font-size: 96px; font-weight: 900; margin: 10px 0; letter-spacing: -3px; }
        .cycle-info { color: var(--text-dim); font-size: 22px; font-weight: 600; }

        .controls { display: flex; gap: 15px; width: 100%; margin-top: 50px; }
        .control-btn { flex: 1; padding: 18px; border-radius: 50px; border: 2.5px solid #3d4656; background: transparent; color: white; font-size: 18px; font-weight: 800; cursor: pointer; }
        .btn-end { border-color: var(--work-color); color: var(--work-color); }

        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="container">
    <!-- 設定畫面 -->
    <div id="setup-screen">
        <div class="input-group">
            <div class="label">準備時間 PREPARE</div>
            <div class="value-control"><input type="number" id="prepTime" value="5"><span class="unit">秒 SEC</span></div>
        </div>
        <div class="input-group">
            <div class="label">運動時間 WORK</div>
            <div class="value-control"><input type="number" id="workTime" value="20"><span class="unit">秒 SEC</span></div>
        </div>
        <div class="input-group">
            <div class="label">休息時間 REST</div>
            <div class="value-control"><input type="number" id="restTime" value="10"><span class="unit">秒 SEC</span></div>
        </div>
        <div class="input-group">
            <div class="label">循環組數 ROUNDS</div>
            <div class="value-control"><input type="number" id="totalCycles" value="8"><span class="unit">組 SETS</span></div>
        </div>
        <button class="start-btn" onclick="startWorkout()">開始運動 START</button>
    </div>

    <!-- 計時器畫面 -->
    <div id="timer-screen">
        <div class="progress-container">
            <svg viewBox="0 0 340 340">
                <circle class="bg-circle" cx="170" cy="170" r="150"></circle>
                <circle id="progress-bar" class="progress-circle" cx="170" cy="170" r="150"></circle>
            </svg>
            <div id="status-label" class="status-badge" style="background: var(--ready-color);">準備 READY</div>
            <div id="timer-text" class="timer-display">00:05</div>
            <div id="cycle-text" class="cycle-info">第 1 / 8 組</div>
        </div>

        <div class="controls">
            <button id="pause-btn" class="control-btn" onclick="togglePause()">暫停 PAUSE</button>
            <button class="control-btn btn-end" onclick="endWorkout()">結束 END</button>
        </div>
    </div>
</div>

<script>
    // --- 全域變數 (修復重複宣告) ---
    let timer = null;
    let timeLeft = 0;
    let currentCycle = 1;
    let isPaused = false;
    let phase = 'READY'; 
    let wakeLock = null;
    
    const circle = document.getElementById('progress-bar');
    const radius = 150;
    const circumference = 2 * Math.PI * radius;
    circle.style.strokeDasharray = `${circumference} ${circumference}`;

    // --- Wake Lock 控制 ---
    async function requestWakeLock() {
        if ('wakeLock' in navigator) {
            try {
                wakeLock = await navigator.wakeLock.request('screen');
                console.log('螢幕長亮已啟動');
            } catch (err) {
                console.error('WakeLock 失敗:', err);
            }
        }
    }

    function releaseWakeLock() {
        if (wakeLock !== null) {
            wakeLock.release().then(() => { wakeLock = null; });
        }
    }

    // --- 核心邏輯 ---
    function startWorkout() {
        const prep = parseInt(document.getElementById('prepTime').value) || 0;
        const work = parseInt(document.getElementById('workTime').value) || 0;
        const rest = parseInt(document.getElementById('restTime').value) || 0;
        const cycles = parseInt(document.getElementById('totalCycles').value) || 1;

        window.workoutSettings = { prep, work, rest, cycles };
        
        document.getElementById('setup-screen').classList.add('hidden');
        document.getElementById('timer-screen').style.display = 'flex';

        currentCycle = 1;
        isPaused = false;
        requestWakeLock();
        startPhase('READY', prep);
    }

    function startPhase(newPhase, duration) {
        phase = newPhase;
        timeLeft = duration;
        updateUI();
        
        if (timer) clearInterval(timer);
        timer = setInterval(() => {
            if (!isPaused) {
                timeLeft--;
                if (timeLeft < 0) {
                    nextPhase();
                } else {
                    updateUI();
                }
            }
        }, 1000);
    }

    function nextPhase() {
        const s = window.workoutSettings;
        if (phase === 'READY') {
            startPhase('WORK', s.work);
        } else if (phase === 'WORK') {
            if (s.rest > 0) {
                startPhase('REST', s.rest);
            } else {
                incrementCycle();
            }
        } else if (phase === 'REST') {
            incrementCycle();
        }
    }

    function incrementCycle() {
        currentCycle++;
        if (currentCycle > window.workoutSettings.cycles) {
            finishWorkout();
        } else {
            startPhase('WORK', window.workoutSettings.work);
        }
    }

    function updateUI() {
        const timerText = document.getElementById('timer-text');
        const statusLabel = document.getElementById('status-label');
        const cycleText = document.getElementById('cycle-text');
        
        let m = Math.floor(timeLeft / 60);
        let s = timeLeft % 60;
        timerText.innerText = `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
        cycleText.innerText = `第 ${currentCycle} / ${window.workoutSettings.cycles} 組`;

        let color, labelText, total;
        if (phase === 'READY') {
            color = 'var(--ready-color)'; labelText = '準備 READY'; total = window.workoutSettings.prep;
        } else if (phase === 'WORK') {
            color = 'var(--work-color)'; labelText = '運動 WORK'; total = window.workoutSettings.work;
        } else {
            color = 'var(--rest-color)'; labelText = '休息 REST'; total = window.workoutSettings.rest;
        }

        circle.style.stroke = color;
        statusLabel.style.background = color;
        statusLabel.innerText = labelText;

        const offset = total > 0 ? circumference - (timeLeft / total) * circumference : 0;
        circle.style.strokeDashoffset = offset;
    }

    function togglePause() {
        isPaused = !isPaused;
        document.getElementById('pause-btn').innerText = isPaused ? '繼續 RESUME' : '暫停 PAUSE';
    }

    function endWorkout() {
        if (confirm("結束運動？")) finishWorkout();
    }

    function finishWorkout() {
        clearInterval(timer);
        releaseWakeLock();
        document.getElementById('setup-screen').classList.remove('hidden');
        document.getElementById('timer-screen').style.display = 'none';
        alert("運動完成！");
    }

    // --- PWA 註冊 ---
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('./sw.js').then(() => console.log('Service Worker Registered'));
        });
    }
</script>

</body>
</html>
